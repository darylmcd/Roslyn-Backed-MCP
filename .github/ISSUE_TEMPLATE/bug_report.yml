name: Bug Report
description: Report a bug in RoslynMcp
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Load workspace with `workspace_load`
        2. Call `symbol_search` with query "..."
        3. Observe error "..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RoslynMcp Version
      placeholder: "0.9.0-beta.1"
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK Version
      placeholder: "9.0.x"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant stderr/log output.
      render: shell
